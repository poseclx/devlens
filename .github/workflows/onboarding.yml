name: DevLens Onboarding

on:
  push:
    branches: [main, master]
    paths:
      - "pyproject.toml"
      - "package.json"
      - "Cargo.toml"
      - "go.mod"
      - "requirements*.txt"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  devlens-onboard:
    name: Generate Onboarding Guide
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-devlens
          restore-keys: ${{ runner.os }}-pip-

      - name: Install DevLens
        run: pip install .

      - name: Run Onboarding Analysis
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: |
          AI_FLAG=""
          if [ -n "$OPENAI_API_KEY" ]; then
            AI_FLAG="--ai --model gpt-4o"
          elif [ -n "$ANTHROPIC_API_KEY" ]; then
            AI_FLAG="--ai --model claude-sonnet-4-20250514"
          elif [ -n "$GEMINI_API_KEY" ]; then
            AI_FLAG="--ai --model gemini-pro"
          fi

          devlens onboard . --format markdown --output ONBOARDING.md $AI_FLAG || true
          devlens onboard . --format html --output devlens-onboarding.html $AI_FLAG || true

      - name: Upload HTML Onboarding Report
        uses: actions/upload-artifact@v4
        with:
          name: devlens-onboarding-${{ github.run_number }}
          path: devlens-onboarding.html
          retention-days: 90

      - name: Commit ONBOARDING.md
        run: |
          if [ ! -f ONBOARDING.md ]; then
            echo "ONBOARDING.md not generated, skipping commit."
            exit 0
          fi

          git config user.name "DevLens Bot"
          git config user.email "devlens@users.noreply.github.com"
          git add ONBOARDING.md

          if git diff --cached --quiet; then
            echo "No changes to ONBOARDING.md, skipping commit."
          else
            git commit -m "docs: update ONBOARDING.md via DevLens"
            git push
          fi
