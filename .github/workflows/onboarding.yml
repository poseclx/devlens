name: DevLens Onboarding

on:
  push:
    branches: [main, master]
    paths:
      - "pyproject.toml"
      - "package.json"
      - "Cargo.toml"
      - "go.mod"
      - "requirements*.txt"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  devlens-onboard:
    name: Generate Onboarding Guide
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-devlens
          restore-keys: ${{ runner.os }}-pip-

      - name: Install DevLens
        run: pip install devlens

      - name: Run Onboarding Analysis
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: |
          AI_FLAG=""
          if [ -n "$OPENAI_API_KEY" ] || [ -n "$ANTHROPIC_API_KEY" ] || [ -n "$GEMINI_API_KEY" ]; then
            AI_FLAG="--ai"
          fi

          devlens onboard . --format markdown --output ONBOARDING.md $AI_FLAG
          devlens onboard . --format html --output devlens-onboarding.html $AI_FLAG

      - name: Upload HTML Onboarding Report
        uses: actions/upload-artifact@v4
        with:
          name: devlens-onboarding-${{ github.run_number }}
          path: devlens-onboarding.html
          retention-days: 90

      - name: Open PR with ONBOARDING.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('ONBOARDING.md')) return;

            const { execSync } = require('child_process');
            const branch = 'devlens/onboarding-update';

            execSync(`git config user.name "DevLens Bot"`);
            execSync(`git config user.email "devlens@users.noreply.github.com"`);
            execSync(`git checkout -B ${branch}`);
            execSync(`git add ONBOARDING.md`);
            execSync(`git commit -m "docs: update ONBOARDING.md via DevLens" || echo "Nothing to commit"`);
            execSync(`git push origin ${branch} --force`);

            const header = '<!-- devlens-onboarding -->';
            const artifactUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = [
              header,
              '## DevLens Onboarding Guide Updated',
              '',
              'DevLens has analyzed the repository structure and generated an updated `ONBOARDING.md`.',
              '',
              `Full HTML report available as artifact: [View Run](${artifactUrl})`,
            ].join('\n');

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (pulls.length === 0) {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'docs: update ONBOARDING.md via DevLens',
                head: branch,
                base: 'main',
                body,
              });
            }
