name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for trusted publishing (OIDC)

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install with dev + all-ai extras
        run: pip install -e ".[all-ai,dev]"

      - name: Run tests
        run: pytest tests/ -v

  publish:
    name: Build & Publish
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/devlens/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Set up trusted publisher at: https://pypi.org/manage/account/publishing/
        # Publisher settings:
        #   PyPI project name: devlens
        #   GitHub owner:      <your-github-username>
        #   Repository:        devlens
        #   Workflow:          publish.yml
        #   Environment:       pypi
