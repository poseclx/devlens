name: DevLens Docs Health

on:
  push:
    branches: [main, master]
    paths:
      - "**.md"
      - "docs/**"
  schedule:
    - cron: "0 9 * * 1"  # Every Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  docs-health:
    name: Docs Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-devlens
          restore-keys: ${{ runner.os }}-pip-

      - name: Install DevLens
        run: pip install devlens

      - name: Find Markdown files
        id: find-docs
        run: |
          FILES=$(find . -name "*.md" -not -path "./.git/*" -not -path "./node_modules/*" | head -20 | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run Docs Health Check
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: |
          AI_FLAG=""
          if [ -n "$OPENAI_API_KEY" ] || [ -n "$ANTHROPIC_API_KEY" ] || [ -n "$GEMINI_API_KEY" ]; then
            AI_FLAG="--ai"
          fi

          mkdir -p devlens-docs-reports

          for f in ${{ steps.find-docs.outputs.files }}; do
            # Derive a safe filename: strip leading ./ and replace / with _
            slug=$(echo "$f" | sed 's|^\./||' | tr '/' '_')
            devlens docs check "$f" --format markdown --output "devlens-docs-reports/${slug%.md}.md" $AI_FLAG
            devlens docs check "$f" --format html    --output "devlens-docs-reports/${slug%.md}.html" $AI_FLAG
          done

          # Merge all markdown reports into one summary file
          cat devlens-docs-reports/*.md > devlens-docs-report.md 2>/dev/null || true

      - name: Upload HTML Docs Report
        uses: actions/upload-artifact@v4
        with:
          name: devlens-docs-health-${{ github.run_number }}
          path: devlens-docs-reports/
          retention-days: 30

      - name: Open Issue if Docs are Unhealthy
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('devlens-docs-report.md')) return;
            const report = fs.readFileSync('devlens-docs-report.md', 'utf8');
            const isFailing = report.includes('FAIL') || report.includes('broken') || report.includes('outdated');
            if (!isFailing) { console.log('Docs are healthy.'); return; }

            const header = '<!-- devlens-docs-health -->';
            const artifactUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const body = [
              header,
              '## DevLens Docs Health Report',
              '',
              report,
              '',
              '---',
              `Full HTML Report: ${artifactUrl} — devlens-docs-health-${{ github.run_number }} artifact.`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'devlens-docs',
              state: 'open',
            });

            const existing = issues.find(i => i.body && i.body.includes(header));
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'DevLens: Docs Health Issues Detected',
                body,
                labels: ['devlens-docs', 'documentation'],
              });
            }
